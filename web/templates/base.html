<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}claude-workspace{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

  <!-- Nav -->
  <nav class="border-b border-gray-800 px-6 py-3 flex items-center justify-between">
    <a href="/" class="text-orange-400 font-bold text-lg hover:text-orange-300">
      claude-workspace
    </a>
    <a href="/new"
       class="bg-orange-500 hover:bg-orange-400 text-white text-sm px-4 py-1.5 rounded transition-colors">
      + New Workspace
    </a>
  </nav>

  <!-- Content -->
  <main class="max-w-5xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
